# Fly.io configuration for ENEM Analytics API
# Deploy command: fly deploy

app = "enem-analytics-api"
primary_region = "gru"  # São Paulo, Brazil

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1  # Keep 1 machine warm to avoid cold starts

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048  # 2GB RAM for GLiNER2

# Health check
[checks]
  [checks.health]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "10s"
    type = "http"

# Secrets to set:
# fly secrets set SUPABASE_URL="https://xxx.supabase.co"
# fly secrets set SUPABASE_SERVICE_KEY="eyJ..."
# fly secrets set SUPABASE_ANON_KEY="eyJ..."
# fly secrets set PIONEER_API_KEY="pio_sk_..."  # optional
